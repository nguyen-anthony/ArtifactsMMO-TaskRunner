name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create the GitHub Release and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Extract version from tag
        shell: bash
        # Strips the leading "v" — e.g. "v1.0.0" becomes "1.0.0"
        run: echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build distributable
        shell: bash
        run: ./gradlew :gui:createReleaseDistributable -Papp.version=${{ env.APP_VERSION }} --no-configuration-cache

      - name: Zip distributable
        shell: pwsh
        run: |
          $src = "gui\build\compose\binaries\main-release\app\ArtifactsMMO"
          $dst = "ArtifactsMMO-${{ env.APP_VERSION }}-windows.zip"
          Compress-Archive -Path $src -DestinationPath $dst
          Write-Host "Created $dst"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ArtifactsMMO-${{ env.APP_VERSION }}-windows.zip
          generate_release_notes: true
